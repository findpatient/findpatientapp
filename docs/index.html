<!doctype html>
<html>
  <head>
    <title>ED Downtime Tracking Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- NHS HEADER -->
    <div id="nhsHeader">
      <div id="nhsHeaderLeft">
        <img src="https://assets.nhs.uk/images/nhs-logo.png" alt="NHS Logo" />
      </div>

      <div id="nhsHeaderCenter">ED Downtime Tracking Tool</div>

      <div id="nhsHeaderRight">
        <!-- TOOLS BUTTON (dropdownTrigger added) -->
        <div id="toolsButton" class="menuButton dropdownTrigger">
          <span id="activeToolLabel">Tracking Board</span>

          <!-- TOOLS MENU (dropdownList added) -->
          <div id="toolsMenu" class="dropdownMenu dropdownList">
            <div id="toolTracking" onclick="loadTrackingBoard()">
              Tracking Board
            </div>
            <div id="toolAddPatient" onclick="loadForm()">Add Patient</div>

            <hr class="dropdownDivider" />

            <div onclick="manualRefresh()" class="noSelect">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="#333"
                style="vertical-align: middle; margin-right: 6px"
              >
                <path
                  d="M12 4V1L8 5l4 4V6c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"
                />
              </svg>
              Refresh
            </div>
          </div>
        </div>

        <div id="timestamp"></div>
      </div>
    </div>

    <div id="mobileHeaderTitle">ED Downtime Tracking Tool</div>

    <!-- DESKTOP VERSION -->
    <div id="desktopContainer">
      <div id="selectorBar">
        <!-- HOSPITAL BUTTON (dropdownTrigger added) -->
        <div id="hospitalButton" class="selectorButton dropdownTrigger">
          <svg width="16" height="16" fill="#003087" viewBox="0 0 24 24">
            <path
              d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 6.5 12 6.5s2.5 1.1 2.5 2.5S13.4 11.5 12 11.5z"
            />
          </svg>
          <span id="activeHospital">Tunbridge Wells</span>

          <!-- HOSPITAL MENU (dropdownList added) -->
          <div id="hospitalMenu" class="dropdownMenu dropdownList">
            <div onclick="selectHospital('Tunbridge Wells')">
              Tunbridge Wells
            </div>
            <div onclick="selectHospital('Maidstone')">Maidstone</div>
          </div>
        </div>

        <!-- LOCATION BUTTON (dropdownTrigger added) -->
        <div id="locationButton" class="selectorButton dropdownTrigger">
          <span id="activeLocation">Whole Dept</span>

          <!-- LOCATION MENU (dropdownList added) -->
          <div id="locationMenu" class="dropdownMenu dropdownList">
            <div onclick="selectLocation('Whole Dept')">Whole Dept</div>
            <!--
            <div onclick="selectLocation('Waiting Room')">Waiting Room</div>
            <div onclick="selectLocation('RAP')">RAP</div>
            <div onclick="selectLocation('Resus')">Resus</div>
            <div onclick="selectLocation('Minors')">Minors</div>
            <div onclick="selectLocation('Majors')">Majors</div>
            <div onclick="selectLocation('Paeds ED')">Paeds ED</div>
            <div onclick="selectLocation('Clinics')">Clinics</div>
            <div onclick="selectLocation('CDU')">CDU</div>
            -->
          </div>
        </div>
      </div>

      <div id="loadingSpinner">Loading…</div>

      <div id="pageContent">
        <iframe id="dashboardFrame" src=""></iframe>
      </div>
    </div>

    <!-- MOBILE VERSION -->
    <div id="mobileContainer">
      <div id="mobileMenu">
        <button class="hospitalButton" onclick="showHospitalSelector()">
          Tracking Board
        </button>
        <button class="hospitalButton" onclick="openForm()">Add Patient</button>
      </div>

      <div id="hospitalSelector" style="display: none">
        <h2>Select Hospital</h2>

        <button class="hospitalButton" onclick="openTW()">
          <svg width="18" height="18" fill="#003087" viewBox="0 0 24 24">
            <path
              d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 6.5 12 6.5s2.5 1.1 2.5 2.5S13.4 11.5 12 11.5z"
            />
          </svg>
          Tunbridge Wells
        </button>

        <button class="hospitalButton" onclick="openMGH()">
          <svg width="18" height="18" fill="#003087" viewBox="0 0 24 24">
            <path
              d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S10.6 6.5 12 6.5s2.5 1.1 2.5 2.5S13.4 11.5 12 11.5z"
            />
          </svg>
          Maidstone
        </button>

        <div class="backLink" onclick="goBack()">← Back</div>
      </div>
    </div>

    <footer id="appFooter">
      <div id="footerLeft"></div>

      <div id="footerRight">
        <span class="footerBrand">findpatient</span>
        <span class="footerDivider">|</span>
        <span class="footerCopy">© 2026</span>
        <span class="footerName" id="footerAuthor"></span>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
