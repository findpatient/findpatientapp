name: Build and Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject obfuscated configuration
        run: |
          sed -i "s|__TW_TABLE_DATA__|${{ secrets.TWH_REF }}|g" docs/script.js
          sed -i "s|__MGH_TABLE_DATA__|${{ secrets.MGH_REF }}|g" docs/script.js
          sed -i "s|__FORM_DATA__|${{ secrets.FORM_REF }}|g" docs/script.js
          sed -i "s|__AUTHOR_DATA__|${{ secrets.AUTHOR_REF }}|g" docs/script.js
          sed -i "s|__KILL_SWITCH__|${{ secrets.KILL_SWITCH }}|g" docs/script.js

          echo "----- Modified script.js (first 40 lines) -----"
          sed -n '1,40p' docs/script.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
